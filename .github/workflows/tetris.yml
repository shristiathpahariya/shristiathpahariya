name: Tetris Game

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  tetris:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.title == 'Play Tetris!' && 
       contains(fromJson('["left","right","rotate","drop","down"]'), github.event.comment.body))

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Tetris Engine
        id: tetris
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node .github/scripts/tetris.js

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md game-state.json
          git diff --staged --quiet || git commit -m "🎮 Tetris move by ${{ github.event.comment.user.login }}"
          git push