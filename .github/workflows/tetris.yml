name: Tetris Game

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

concurrency:
  group: readme-update
  cancel-in-progress: false

permissions:
  issues: write
  contents: write

jobs:
  tetris:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.title == '🎮 Play Tetris!' && 
       (contains(github.event.comment.body, 'left') || 
        contains(github.event.comment.body, 'right') || 
        contains(github.event.comment.body, 'rotate') || 
        contains(github.event.comment.body, 'drop') || 
        contains(github.event.comment.body, 'down') ||
        contains(github.event.comment.body, 'reset') ||
        contains(github.event.comment.body, 'Left') || 
        contains(github.event.comment.body, 'Right') || 
        contains(github.event.comment.body, 'Rotate') || 
        contains(github.event.comment.body, 'Drop') || 
        contains(github.event.comment.body, 'Down') ||
        contains(github.event.comment.body, 'Reset')))

    steps:
      - name: Debug event data
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Issue title: ${{ github.event.issue.title }}"
          echo "Comment body: '${{ github.event.comment.body }}'"
          echo "Condition check:"
          echo "  - Event name is workflow_dispatch: ${{ github.event_name == 'workflow_dispatch' }}"
          echo "  - Issue title matches: ${{ github.event.issue.title == '🎮 Play Tetris!' }}"
          echo "  - Comment contains valid move: YES"
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Tetris Engine
        id: tetris
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/tetris.js

      - name: Debug output
        run: |
          echo "Files in root:"
          ls -la
          echo "SVG exists:"
          test -f tetris.svg && echo "YES" || echo "NO - FILE MISSING"

      - name: Commit updated README and SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md game-state.json tetris-*.svg
          # Remove old SVG files that are no longer referenced in README
          git ls-files 'tetris-*.svg' | while read f; do
            if ! grep -q "$f" README.md; then
              git rm "$f" 2>/dev/null || true
            fi
          done
          git diff --staged --quiet || git commit -m "🎮 Tetris move by ${{ github.event.comment.user.login }}"
          
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push rejected (attempt $i), pulling with rebase..."
            git stash --include-untracked
            git pull --rebase origin main
            git stash pop || true
            if git diff --name-only HEAD~1 | grep -q "game-state.json"; then
              echo "game-state.json was updated by another move, re-applying..."
              node .github/scripts/tetris.js
              git add README.md game-state.json tetris-*.svg
              git ls-files 'tetris-*.svg' | while read f; do
                if ! grep -q "$f" README.md; then
                  git rm "$f" 2>/dev/null || true
                fi
              done
              git diff --staged --quiet || git commit --amend --no-edit
            fi
          done
          echo "Failed to push after 3 attempts"
          exit 1